{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<section class="container py-5">

  <div class="row justify-content-center">

    <div class="col-12 col-md-10 col-lg-7 col-xl-6">

      <h1 class="display-4 spirit-text-red spirit-hero-subtitle mb-5">
        Login
      </h1>

      <form method="POST" action="{{ url_for('login') }}">

        <!-- EMAIL -->

        <div class="mb-4">

          <label
            for="email"
            class="form-label fw-semibold"
          >
            Email
          </label>

          <input
            type="email"
            id="email"
            name="email"
            class="form-control border-0 rounded-4 py-3 px-4"
            required
          >

        </div>

        <!-- PASSWORD -->

        <div class="mb-4">

          <label
            for="password"
            class="form-label fw-semibold"
          >
            Password
          </label>

          <input
            type="password"
            id="password"
            name="password"
            class="form-control border-0 rounded-4 py-3 px-4"
            required
          >

        </div>

        <!-- BUTTON -->

        <button
          type="submit"
          class="btn btn-dark rounded-4 px-4 py-3 mb-3"
        >
          Login
        </button>

      </form>

      <!-- FORGOT PASSWORD -->

      <div class="mb-5">

        <a
          href="#"
          class="text-decoration-none spirit-text-red fw-light"
        >
          Forgot Password?
        </a>

      </div>

      <!-- REGISTER -->

      <p class="mb-0 text-secondary fw-light">

        Don’t have an account?

        <a
          href="{{ url_for('register') }}"
          class="text-decoration-none spirit-text-red fw-light"
        >
          Click here to register
        </a>

      </p>

    </div>

  </div>

</section>

{% endblock %}

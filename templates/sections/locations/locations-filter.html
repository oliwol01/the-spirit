<section id="locations-filter" class="py-5">

  <div class="container">

    <div class="locations-search-wrapper mb-4">

      <div class="input-group locations-search-group">

        <span class="input-group-text bg-white border-0 px-4">
          <i class="bi bi-search"></i>
        </span>

        <input
          type="text"
          class="form-control border-0 shadow-none py-3"
          placeholder="Search venue name..."
        >

      </div>

    </div>

    <h5 class="locations-filter-title mb-3">
      Browse by venue type
    </h5>

    <div class="locations-filter-buttons d-flex flex-wrap gap-3">

      <button
        class="locations-filter-btn active"
        data-category="All"
      >
        All
      </button>

      <button
        class="locations-filter-btn"
        data-category="Church"
      >
        Church
      </button>

      <button
        class="locations-filter-btn"
        data-category="Mosque"
      >
        Mosque
      </button>

      <button
        class="locations-filter-btn"
        data-category="Synagogue"
      >
        Synagogue
      </button>

      <button
        class="locations-filter-btn"
        data-category="Temple"
      >
        Temple
      </button>

      <button
        class="locations-filter-btn"
        data-category="Other"
      >
        Other
      </button>

    </div>

  </div>

</section>

<!-- Header -->
<section class="form-header">
  <h1 class="form-title">Onboarding</h1>

<!-- Progress bar -->
  <div class="progress-bar">
    <span class="progress-line"></span>
    <span class="progress-dot active"></span>
    <span class="progress-line"></span>
    <span class="progress-dot"></span>
    <span class="progress-line"></span>
  </div>
</section>

<!-- Subheader -->
<section class="form-section">
  <h2 class="subheader">Details</h2>

<!-- Name -->
  <label for="artist-name" class="form-label">What is your artist name?*</label>
  <input
    type="text"
    id="artist-name"
    name="artist_name"
    class="textbox"
    required
    maxlength="60"
    minlength="2"
    autocomplete="nickname"
  >

<!-- Phone number -->
  <label for="phone-number" class="form-label">Phone Number*</label>
  <input
    type="tel"
    id="maker-phone-number"
    name="phone_number"
    class="textbox"
    required
    inputmode="tel"
    autocomplete="tel"
    pattern="^[0-9+()\-\\s]{7,20}$"
    maxlength="20"
  >

<!-- Gender -->
<div class="form-group">
<label class="form-label">Gender*</label>
  <div class="pill-options">
    <label class="pill-option"><input type="radio" name="gender" value="male" required /><span class="pill">Male</span></label>
    
    <label class="pill-option"><input type="radio" name="gender" value="female" /><span class="pill">Female</span></label>
    
    <label class="pill-option"><input type="radio" name="gender" value="non-binary" /><span class="pill">Non-Binary</span></label>
    
    <label class="pill-option"><input type="radio" name="gender" value="other" /><span class="pill">Other</span></label>
  </div>
</div>

<!-- Website -->
<div class="form-group">
  <label class="form-label" for="website">Website</label>
  <input
    class="textbox"
    type="url"
    id="maker-website"
    name="website"
    maxlength="200"
    placeholder="https://example.com"
    autocomplete="url"
  />
</div>

<!-- Social media -->
<div class="form-group">
  <label class="form-label">Social media ID's</label>
  <div class="grouped-inputs">

    <div class="grouped-input-row">
      <label class="grouped-input-label" for="instagram">Instagram:</label>
      <input
        class="grouped-input-field"
        type="text"
        id="maker-instagram"
        name="instagram"
        maxlength="50"
        pattern="^[A-Za-z0-9._]+$"
        placeholder="@username"
        autocomplete="username"
      />
    </div>

    <div class="grouped-input-row">
      <label class="grouped-input-label" for="linkedin">LinkedIn:</label>
      <input
        class="grouped-input-field"
        type="text"
        id="maker-linkedin"
        name="linkedin"
        maxlength="100"
        placeholder="linkedin.com/in/name"
      />
    </div>

    <div class="grouped-input-row">
      <label class="grouped-input-label" for="tiktok">TikTok:</label>
      <input
        class="grouped-input-field"
        type="text"
        id="maker-tiktok"
        name="tiktok"
        maxlength="50"
        pattern="^[A-Za-z0-9._]+$"
        placeholder="@username"
      />
    </div>

  </div>
</div>

<!-- Navigation button -->
<div class="form-nav form-nav-one">
  <button type="button" class="btn-next">Next</button>
</div>

</section>

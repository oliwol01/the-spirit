<!-- Header -->
<section class="form-header">
  <h1 class="form-title">Onboarding</h1>

<!-- Progress bar -->
  <div class="progress-bar">
    <span class="progress-line"></span>
    <span class="progress-dot active"></span>
    <span class="progress-line"></span>
    <span class="progress-dot active"></span>
    <span class="progress-line"></span>
  </div>
</section>

<!-- Subheader -->
<section class="form-section">
  <h2 class="subheader">Your Program</h2>

<!-- Type of maker -->
<div class="form-group">
<label class="form-label">What type of maker are you? (Select a maximum of 3)*</label>
  <div class="pill-options">
    <label class="pill-option"><input type="checkbox" name="genre" value="music"/><span class="pill">Music</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="exhibition" /><span class="pill">Exhibition</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="mindfulness" /><span class="pill">Mindfulness</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="reading" /><span class="pill">Reading</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="theatre" /><span class="pill">Theatre</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="workshop" /><span class="pill">Workshop</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="philosophy" /><span class="pill">Philosophy</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="dance" /><span class="pill">Dance</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="rituals" /><span class="pill">Rituals</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="film" /><span class="pill">Film</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="visual-art" /><span class="pill">Visual Art</span></label>
    
    <label class="pill-option"><input type="checkbox" name="genre" value="other" /><span class="pill">Other</span></label>
</div>
</div>

<!-- Themes -->
  <label for="theme" class="form-label">What type of themes are present within your work?*</label>
  <input
    type="text"
    id="maker-theme"
    name="maker_theme"
    class="textbox"
    required
    minlength="5"
    maxlength="200"
    placeholder="Identity, community, sustainability..."
  >

<!-- Previous performances -->
  <label for="theme" class="form-label">Previous performances</label>
  <input
    type="text"
    id="previous-performances"
    name="previous_performances"
    class="textbox"
    maxlength="300"
    placeholder="Festivals, galleries, workshops, venues..."
  >

<!-- Photos or logos -->
<label for="photos-logos" class="form-label">Photos or logos</label>

<div class="border rounded-4 p-4 bg-light-subtle text-center mb-4">

  <input
    type="file"
    id="photos-logos"
    name="photos_logos"
    class="form-control"
    multiple
    accept="image/png, image/jpeg, image/webp"
  >

  <p class="small text-muted mt-3 mb-0">
    Upload photos, logos, or visual material related to your work.
  </p>

</div>

<!-- Navigation buttons -->
<div class="form-nav">
  <button type="button" class="btn-back">Back</button>
  <button type="submit" class="btn-submit">Submit</button>
</div>

</section>

<div class="form-header">
  <h1 class="form-title">Onboarding</h1>
  <div class="progress-bar">
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
  </div>
</div>

<div class="form-section">

  <h3 class="subheader">Venue Photos</h3>

  <p>Photos help makers understand the atmosphere and possibilities of your space.<br>
    You can upload up to 4 photos.</p>

  <label class="form-label">Cover photo</label>
  <label for="venue-cover-photo" class="venue-upload-card venue-upload-card-cover">
    <i class="bi bi-image fs-3 text-secondary"></i>
    <strong class="venue-upload-title">Upload cover photo</strong>
    <small class="venue-upload-meta">JPG or PNG, max 10MB<br>Recommended: 16:9 landscape</small>
    <input
      type="file"
      id="venue-cover-photo"
      name="cover_image"
      class="venue-hidden-input"
      accept="image/png, image/jpeg, image/webp"
    >
  </label>

  <label class="form-label venue-additional-label">Additional photos (optional)</label>
  <div class="venue-upload-grid">

    <label for="venue-additional-photo-1" class="venue-upload-card venue-upload-card-small">
      <i class="bi bi-plus fs-3 text-secondary"></i>
      <strong class="venue-upload-title">Add photo</strong>
      <input
        type="file"
        id="venue-additional-photo-1"
        name="images"
        class="venue-hidden-input"
        accept="image/png, image/jpeg, image/webp"
      >
    </label>

    <label for="venue-additional-photo-2" class="venue-upload-card venue-upload-card-small">
      <i class="bi bi-plus fs-3 text-secondary"></i>
      <strong class="venue-upload-title">Add photo</strong>
      <input
        type="file"
        id="venue-additional-photo-2"
        name="images"
        class="venue-hidden-input"
        accept="image/png, image/jpeg, image/webp"
      >
    </label>

    <label for="venue-additional-photo-3" class="venue-upload-card venue-upload-card-small">
      <i class="bi bi-plus fs-3 text-secondary"></i>
      <strong class="venue-upload-title">Add photo</strong>
      <input
        type="file"
        id="venue-additional-photo-3"
        name="images"
        class="venue-hidden-input"
        accept="image/png, image/jpeg, image/webp"
      >
    </label>

  </div>

  <div class="form-nav">
    <button type="button" class="form-btn btn-back">← Back</button>
    <button type="submit" class="btn-submit">Submit</button>
  </div>

</div>

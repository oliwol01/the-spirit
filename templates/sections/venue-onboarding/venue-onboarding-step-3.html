<div class="form-header">
  <h1 class="form-title">Onboarding</h1>
  <div class="progress-bar">
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot"></div>
  </div>
</div>

<div class="form-section">

  <h3 class="subheader">Desired Programming</h3>

  <label class="form-label">Tell the story of your venue.<br>
    Describe the atmosphere, history, community, mission, or character of your space.*
  </label>
  <textarea class="textbox" id="venue-story" name="venue-story" maxlength="1000"
    style="height: auto; min-height: 130px;" required></textarea>

  <label class="form-label">Which forms of art, culture, or other programs suit you best?*<br>
    Please select all that apply.
  </label>
  <div class="pill-options">
    <label class="pill-option">
      <input type="checkbox" name="program" value="theatre">
      <span class="pill">Theatre</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="spoken-word">
      <span class="pill">Spoken word</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="music">
      <span class="pill">Music/concerts</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="workshops">
      <span class="pill">Workshops</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="silence-experiences">
      <span class="pill">Silence experiences</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="rituals-ceremonies">
      <span class="pill">Rituals/ceremonies</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="exhibitions">
      <span class="pill">Exhibitions</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="light-art">
      <span class="pill">Light art</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="movie-screenings">
      <span class="pill">Movie screenings</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="dinner">
      <span class="pill">Dinner</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="dance">
      <span class="pill">Dance</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="program" value="other">
      <span class="pill">Other</span>
    </label>
  </div>
  <input type="text" class="textbox" id="program-description" name="program-description"
    placeholder="Description if preferred">

  <label class="form-label">Do you want to say something about the programming?
    For example, about what is really <em>not</em> desired?
  </label>
  <textarea class="textbox" id="not-desired" name="not-desired" maxlength="250"
    style="height: auto; min-height: 130px;"></textarea>

  <label class="form-label">What would you like prospective makers to know about your location?*</label>
  <textarea class="textbox" id="info-for-makers" name="info-for-makers" maxlength="250"
    style="height: auto; min-height: 130px;" required></textarea>

  <div class="form-nav">
    <button type="button" class="form-btn btn-back">← Back</button>
    <button type="button" class="form-btn btn-next">Next →</button>
  </div>

</div>

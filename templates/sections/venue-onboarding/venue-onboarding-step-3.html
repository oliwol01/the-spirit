<div class="form-header">
  <h1 class="form-title">Onboarding</h1>
  <div class="progress-bar">
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot active"></div>
    <div class="progress-line"></div>
    <div class="progress-dot"></div>
  </div>
</div>

<div class="form-section">

  <h3 class="subheader">Desired Programming</h3>

  <label class="form-label">Tell the story of your venue.<br>
    Describe the atmosphere, history, community, mission, or character of your space.*
  </label>
  <textarea
    class="textbox venue-textarea-lg"
    id="venue-story"
    name="description"
    maxlength="1000"
    required
  ></textarea>

  <label class="form-label">Which forms of art, culture, or other programs suit you best?*<br>
    Please select all that apply.
  </label>
  <div class="pill-options">
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="theatre">
      <span class="pill">Theatre</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="spoken-word">
      <span class="pill">Spoken word</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="music">
      <span class="pill">Music/concerts</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="workshops">
      <span class="pill">Workshops</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="silence-experiences">
      <span class="pill">Silence experiences</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="rituals-ceremonies">
      <span class="pill">Rituals/ceremonies</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="exhibitions">
      <span class="pill">Exhibitions</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="light-art">
      <span class="pill">Light art</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="movie-screenings">
      <span class="pill">Movie screenings</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="dinner">
      <span class="pill">Dinner</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="dance">
      <span class="pill">Dance</span>
    </label>
    <label class="pill-option">
      <input type="checkbox" name="programming_tags" value="other">
      <span class="pill">Other</span>
    </label>
  </div>

  <span id="venue-program-error" class="venue-program-error">
    Please select at least one option.
  </span>
  
  <input
    type="text"
    class="textbox"
    id="venue-program-description"
    name="programming_other"
    placeholder="Description if preferred"
    maxlength="200"
  >

  <label class="form-label">Do you want to say something about the programming?
    For example, about what is really <em>not</em> desired?
  </label>
  <textarea
    class="textbox venue-textarea-lg"
    id="venue-not-desired"
    name="restrictions"
    maxlength="250"
  ></textarea>

  <label class="form-label">What would you like prospective makers to know about your location?</label>
  <textarea
    class="textbox venue-textarea-lg"
    id="venue-info-for-makers"
    name="maker_message"
    maxlength="250"
  ></textarea>

  <div class="form-nav">
    <button type="button" class="form-btn btn-back">← Back</button>
    <button type="button" class="form-btn btn-next">Next →</button>
  </div>

</div>

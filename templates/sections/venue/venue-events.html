

<section id="venue-events" class="py-5">

  <div class="container">

    <h2 class="fs-2 spirit-hero-subtitle spirit-text-red text-center mb-5">
      Organised Events
    </h2>

    <div class="row justify-content-center g-4">

      {% for event in events[:4] %}

        <div class="col-auto">

          <a
            href="{{ event.link }}"
            target="_blank"
            class="text-decoration-none d-block"
          >

            <div class="spirit-venue-card">

              <img
                src="{{ url_for('static', filename=event.image) }}"
                alt="{{ event.title }}"
                class="img-fluid w-100 spirit-venue-image mb-3"
              />

              <h3 class="fs-3 fw-normal spirit-text-red lh-1 mb-3 spirit-hero-subtitle">
                {{ event.title }}
              </h3>

              <div class="d-flex flex-wrap gap-2 mb-3">

                {% for tag in event.tags.split(',') %}

                  <span class="badge rounded-pill text-bg-light fw-normal px-3 py-2">

                    {{ tag.strip() }}

                  </span>

                {% endfor %}

              </div>

              <div class="d-flex align-items-center gap-2 fs-6 spirit-text-red">

                <span>
                  {{ event.location }}
                </span>

              </div>

            </div>

          </a>

        </div>

      {% endfor %}

    </div>

  </div>

</section>

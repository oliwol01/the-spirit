<section id="section-1" class="proposal-wrapper container py-5 form-section">

    <h1 class="proposal-title text-center mb-5">
        Proposal Form
    </h1>

    <div class="proposal-card">

        <h2 class="section-title">Your Idea</h2>

        <!-- TITLE -->
        <div class="mb-4">
            <label class="proposal-label">
                Title*
            </label>

            <input
                type="text"
                name="title"
                class="proposal-input"
                maxlength="20"
            >
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-4">
            <label class="proposal-label">
                Describe the core of what you want to create*
            </label>

            <textarea
                name="description"
                class="proposal-textarea"
                maxlength="100"
            ></textarea>
        </div>

        <!-- TAGS -->
        <div class="mb-5">
            <label class="proposal-label">
                What kind of format is it?*
            </label>

            <div class="tag-container">

                <button type="button" class="tag">Music</button>
                <button type="button" class="tag">Mindfulness</button>
                <button type="button" class="tag">Ceremony</button>
                <button type="button" class="tag">Silence</button>
                <button type="button" class="tag">Storytelling</button>
                <button type="button" class="tag">Dance</button>
                <button type="button" class="tag">Philosophy</button>
                <button type="button" class="tag">Visual Arts</button>
                <button type="button" class="tag">Theatre</button>
                <button type="button" class="tag">Concert</button>
                <button type="button" class="tag">Other</button>

            </div>
        </div>

        <button
            type="button"
            class="next-btn"
            onclick="showSection(2)">
            Next
        </button>

    </div>

</section>
